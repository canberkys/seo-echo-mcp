name: Publish to PyPI

# PyPI trusted publishing is not yet configured on this repo. Until the PyPI
# project + GitHub OIDC linkage is in place, keep this workflow manual-only
# (workflow_dispatch) so new GitHub Releases don't trigger a failing run.
# To enable automatic publishing on release, uncomment the `release:` block.
on:
  workflow_dispatch:
  # release:
  #   types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Build
        run: uv build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
